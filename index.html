<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desktop</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://kit.fontawesome.com/72d2169ad4.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./styles/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <script src="/scripts/context-menu.js" defer></script>
    <script src="/scripts/top-nav-bar.js" defer></script>
    <script src="/scripts/notification-panel.js" defer></script>
    <script src="/scripts/dock.js" defer></script>
    <script src="/scripts/app.js" defer></script>
</head>

<body class="noto-sans-meow">

    <nav class="fixed top-0 left-0 w-full h-9 px-2 flex items-center justify-between z-50 backdrop-blur-xs">

        <div class="flex-1 flex justify-start">
            <div
                class="bg-black/90 hover:bg-black/50 text-white px-3 h-7 rounded-full flex items-center gap-1.5 cursor-pointer transition">
                <div class="w-5 h-2 bg-white rounded-full"></div>
                <div class="w-2 h-2 bg-white/40 rounded-full"></div>
            </div>
        </div>

        <div class="flex-1 flex justify-center">
            <div id="date-trigger"
                class="bg-black/90 hover:bg-black/50 text-white px-3 h-7 rounded-full flex items-center gap-2 text-[13px] font-bold cursor-pointer transition">
                <span class="tabular-nums inline-block w-[7ch] text-right" id="current-date">___ __</span>
                <span class="tabular-nums inline-block w-[8ch] text-right" id="current-time">__:__ __</span>
            </div>
        </div>

        <div class="flex-1 flex justify-end gap-2">
            <div
                class="bg-black/90 hover:bg-black/50 text-white px-3 h-7 rounded-full flex items-center gap-3 text-[11px] font-medium cursor-pointer transition">
                <span id="mem-stat" class="flex items-center gap-1 transition-colors duration-500"><i
                        class="fa-solid fa-memory"></i>
                    <span class="tabular-nums inline-block w-[4ch] text-right" id="mem-value">N/A%</span>
                </span>
                <span id="temp-stat" class="flex items-center gap-1 transition-colors duration-500">
                    <i class="fa-solid fa-temperature-half"></i>
                    <span id="temp-value" class="tabular-nums inline-block w-[4ch] text-right">N/A°C</span>
                </span>
                <span id="cpu-stat" class="flex items-center gap-1 transition-colors duration-500">
                    <i class="fa-solid fa-microchip"></i>
                    <span class="tabular-nums inline-block w-[4ch] text-right" id="cpu-value">N/A%</span>
                </span>
                <span id="power-stat" class="flex items-center gap-1 transition-colors duration-500">
                    <i class="fa-solid fa-bolt"></i>
                    <span id="power-value" class="tabular-nums inline-block w-[6ch] text-right">N/A W</span>
                </span>
            </div>

            <div
                class="bg-black/90 hover:bg-black/50 text-white px-3 h-7 rounded-full flex items-center gap-3 text-[12px] cursor-pointer transition">
                <div class="flex items-center gap-1">
                    <i id="wifi-icon" class="fa-solid fa-wifi"></i>
                    <!-- <i id="volume-icon" class="fa-solid fa-volume"></i> -->
                    <div class="relative flex items-center">
                        <i id="battery-icon" class="fa-solid fa-battery-three-quarters rotate-270 text-[14px]"></i>

                        <div id="charging-bolt"
                            class="absolute -bottom-1 -right-1 bg-black rounded-full w-2.5 h-2.5 flex items-center justify-center">
                            <i class="fa-solid fa-bolt text-[8px] text-yellow-400"></i>
                        </div>
                    </div>
                    <span id="battery-percent" class="font-bold">--%</span>
                </div>
            </div>
        </div>

    </nav>
    <div id="notification-shade"
        class="-top-full fixed left-1/2 -translate-x-1/2 w-[800px] h-[600px] bg-[#1e1e1e]/95 backdrop-blur-2xl border border-white/10 rounded-[24px] p-6 text-white z-40 flex gap-8 shadow-2xl">

        <div class="flex-1 flex flex-col min-w-0">
            <div class="mb-4 px-1">
                <h2 class="text-[11px] font-bold uppercase tracking-widest text-gray-500">Notifications</h2>
            </div>

            <div id="notification-list" class="flex-1 overflow-y-auto space-y-3 pr-2 custom-scrollbar">
            </div>

            <div class="mt-4 pt-2">
                <button onclick="window.NotificationManager.clearAll()"
                    class="bg-white/10 hover:bg-white/20 text-[12px] font-medium px-4 py-1.5 rounded-lg transition-all text-gray-200">
                    Clear
                </button>
            </div>
        </div>

        <div class="w-[280px] flex flex-col gap-4">
            <div class="border-b border-white/10 pb-2">
                <p id="shade-day-name" class="text-xs font-bold text-gray-400 uppercase">Sunday</p>
                <p id="shade-full-date" class="text-xl font-bold">March 15 2026</p>
            </div>

            <div class="bg-white/5 rounded-xl p-3 text-[11px]">
                <div class="flex justify-between mb-4 px-1">
                    <button id="prev-month" class="hover:text-blue-400">
                        <i class="fa-solid fa-caret-left"></i>
                    </button>
                    <span id="calendar-month-year" class="font-bold">March 2026</span>
                    <button id="next-month" class="hover:text-blue-400">
                        <i class="fa-solid fa-caret-right"></i>
                    </button>
                </div>
                <div class="grid grid-cols-7 gap-y-2 text-center">
                    <span class="opacity-40">S</span><span class="opacity-40">M</span><span
                        class="opacity-40">T</span><span class="opacity-40">W</span><span
                        class="opacity-40">T</span><span class="opacity-40">F</span><span class="opacity-40">S</span>
                </div>
                <div id="calendar-days" class="grid grid-cols-7 gap-y-2 text-center mt-2">
                </div>
            </div>

            <div class="bg-white/5 rounded-xl p-3 flex flex-col gap-2">
                <div class="flex justify-between text-xs font-bold">
                    <span>Weather</span>
                    <span id="weather-city" class="opacity-50">Detecting...</span>
                </div>
                <div class="flex justify-between items-center py-2">
                    <i id="weather-icon" class="fa-solid fa-sun text-yellow-400"></i>
                    <span id="weather-temp" class="text-2xl font-bold">32°</span>
                </div>
            </div>
        </div>
    </div>
    <div id="desktop-grid"
        class="fixed inset-0 pt-16 p-4 grid grid-cols-auto-fill gap-6 w-fit h-fit pointer-events-none">
    </div>
    <div id="window-layer" class="fixed inset-0 pointer-events-none z-10">
    </div>

    <div id="dock-container">
    </div>

    <div id="context-menu"
        class="fixed hidden z-10000 min-w-40 bg-[#252525]/90 backdrop-blur-xl border border-white/10 rounded-lg shadow-2xl py-1 text-white text-[13px]">
    </div>

    <template id="window-template">
        <div
            class="window pointer-events-auto absolute bg-[#1e1e1e] rounded-t-xl shadow-2xl border border-white/10 flex flex-col overflow-hidden min-w-[400px] min-h-[300px]">

            <div class="resizer resizer-n absolute top-0 left-2 right-2 h-1.5 cursor-n-resize z-30"></div>
            <div class="resizer resizer-s absolute bottom-0 left-2 right-2 h-1.5 cursor-s-resize z-30"></div>
            <div class="resizer resizer-e absolute top-2 bottom-2 right-0 w-1.5 cursor-e-resize z-30"></div>
            <div class="resizer resizer-w absolute top-2 bottom-2 left-0 w-1.5 cursor-w-resize z-30"></div>

            <div class="resizer resizer-nw absolute top-0 left-0 w-3 h-3 cursor-nw-resize z-40"></div>
            <div class="resizer resizer-ne absolute top-0 right-0 w-3 h-3 cursor-ne-resize z-40"></div>
            <div class="resizer resizer-sw absolute bottom-0 left-0 w-3 h-3 cursor-sw-resize z-40"></div>
            <div class="resizer resizer-se absolute bottom-0 right-0 w-3 h-3 cursor-se-resize z-40"></div>

            <div
                class="window-header bg-[#2d2d2d] p-2 flex justify-between items-center cursor-move select-none z-20 relative">
                <span class="window-title text-[12px] font-bold text-gray-300 ml-2">App</span>
                <div class="window-controls flex items-center gap-1.5 px-2">
                    <button
                        class="reload-btn w-6 h-6 rounded-full hover:bg-white/10 flex items-center justify-center transition">
                        <i
                            class="fa-solid fa-rotate-right text-[10px] text-gray-400 transition-transform duration-500"></i>
                    </button>
                    <button
                        class="min-btn w-6 h-6 rounded-full hover:bg-white/10 flex items-center justify-center transition">
                        <i class="fa-solid fa-minus text-[10px] text-gray-400"></i>
                    </button>
                    <button
                        class="max-btn w-6 h-6 rounded-full hover:bg-white/10 flex items-center justify-center transition">
                        <i class="fa-solid fa-expand text-[10px] text-gray-400"></i>
                    </button>
                    <button
                        class="close-btn w-6 h-6 rounded-full hover:bg-red-500/80 flex items-center justify-center transition">
                        <i class="fa-solid fa-xmark text-[10px] text-gray-300"></i>
                    </button>
                </div>
            </div>
            <div class="flex-1 bg-white relative">
                <iframe class="w-full h-full border-none"></iframe>
            </div>
        </div>
    </template>
</body>

</html>
